# Her push'ta arayüzü derleyip GitHub Pages'e otomatik yayınlar.
# Site: https://zncrkrn.github.io/saldirgan-tespit-sistemi/
name: Yayınla (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Bağımlılıkları kur
        working-directory: frontend
        run: npm ci

      - name: Derle
        working-directory: frontend
        env:
          VITE_BASE: /saldirgan-tespit-sistemi/
        run: npm run build

      # SPA yönlendirmesi: bilinmeyen yollar 404.html'e düşer,
      # o da index.html'in kopyası olduğu için React Router devralır.
      - name: SPA 404 fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
